<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión – Tambo360</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .card {
        background: #ffffff;
        border-radius: 1.25rem;
        padding: 3rem 2.5rem;
        max-width: 26rem;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        text-align: center;
      }

      .icon-wrapper {
        background-color: #f1f5f9;
        border-radius: 0.875rem;
        padding: 1rem;
        margin-bottom: 0.5rem;
      }

      .icon-wrapper svg {
        width: 2rem;
        height: 2rem;
        color: #94a3b8;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #94a3b8;
      }

      p {
        font-size: 0.875rem;
        color: #94a3b8;
        line-height: 1.6;
        max-width: 20rem;
      }

      button {
        margin-top: 0.75rem;
        background-color: #1e293b;
        color: #ffffff;
        border: none;
        border-radius: 0.625rem;
        padding: 0.75rem 1.75rem;
        font-size: 0.9375rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: background-color 0.15s ease;
      }

      button:hover {
        background-color: #161616;
      }
      button:active {
        background-color: black;
      }

      /* Spinner icon */
      .spin {
        animation: spin 1s linear infinite;
        display: none;
      }
      button.loading .spin {
        display: inline;
      }
      button.loading .static {
        display: none;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrapper">
        <!-- wifi-off icon (inline SVG, no external deps needed) -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="2" y1="2" x2="22" y2="22" />
          <path d="M8.5 16.5a5 5 0 0 1 7 0" />
          <path d="M2 8.82a15 15 0 0 1 4.17-2.65" />
          <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76" />
          <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68" />
          <path d="M5 13a10 10 0 0 1 5.24-2.76" />
          <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none" />
        </svg>
      </div>

      <h1>Sin conexión a internet</h1>

      <p>
        Tu dispositivo no esta conectado. Para cargar o guardar nuevos datos,
        necesitas una conexión activa
      </p>

      <button onclick="handleRetry(this)">
        Reintentar
        <svg
          class="static"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        <svg
          class="spin"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </button>
    </div>

    <script>
      function handleRetry(btn) {
        btn.classList.add('loading')
        // Espera 1s para dar feedback visual, luego recarga
        setTimeout(() => {
          if (navigator.onLine) {
            window.location.href = '/'
          } else {
            btn.classList.remove('loading')
          }
        }, 1000)
      }

      // Si recupera conexión automáticamente, redirige solo
      window.addEventListener('online', () => {
        window.location.href = '/'
      })
    </script>
  </body>
</html>
